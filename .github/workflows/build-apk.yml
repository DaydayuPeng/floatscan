name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2

      - name: Build debug APK
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          gradle :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log || true
          echo "========== ERROR LINES =========="
          grep -nE "error:|Error|FAILED|AAPT|Android resource linking" build.log || true
          echo "========== LOG TAIL =========="
          tail -n 120 build.log
          grep -q "BUILD SUCCESSFUL" build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FloatScan-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
